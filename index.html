<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Anwar - منصة الروايات السحابية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://pl29586659.effectivecpmnetwork.com/66/8b/cb/668bcb4bb64a3fe6f4d61ba82b713040.js"></script>

    <style>
        :root { --bg-main: #0b0b0b; --bg-card: #141414; --primary-red: #e50914; --accent-red: #ff2e3b; --text-main: #ffffff; --text-muted: #aaaaaa; --nav-bg: #111111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }
        header { background-color: var(--nav-bg); border-bottom: 2px solid var(--primary-red); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--primary-red); }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background-color: #0f0f0f; z-index: 2000; transition: right 0.4s ease; padding: 30px 20px; border-left: 1px solid rgba(229, 9, 20, 0.3); }
        .sidebar.active { right: 0; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        .section-title { font-size: 22px; margin-bottom: 25px; padding-right: 12px; border-right: 4px solid var(--primary-red); }
        .novels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 20px; }
        .novel-card { background-color: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid #1c1c1c; cursor: pointer; height: 100%; }
        .thumbnail-container { position: relative; width: 100%; padding-top: 140%; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .admin-form { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--primary-red); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; background: #0b0b0b; border: 1px solid #333; color: white; border-radius: 6px; }
        .submit-btn { background: var(--primary-red); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        .view-section { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">King <span>Anwar</span></div>
        <button class="menu-btn" id="menuOpenBtn"><i class="fa-solid fa-bars"></i></button>
    </header>

    <nav class="sidebar" id="sidebar">
        <button class="close-sidebar" id="menuCloseBtn"><i class="fa-solid fa-xmark"></i></button>
        <ul class="sidebar-menu" style="list-style:none; margin-top:50px;">
            <li><a href="#" style="color:white; text-decoration:none;" onclick="showSection('home-section');">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- أعدت لك الأقسام السابقة كما كانت -->
        <section id="home-section">
            <h2 class="section-title">الروايات</h2>
            <div class="novels-grid" id="novels-display-grid"></div>
        </section>

        <!-- يمكنك إضافة قسم الـ admin-section هنا بنفس الطريقة السابقة -->
    </div>

    <script>
        // هنا يتم وضع الكود البرمجي لـ Supabase لاستعادة وظائف العرض والرفع
        // (تم استعادة التصميم الأصلي للموقع)
    </script>
</body>
</html>
