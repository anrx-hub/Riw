<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Anwar - منصة الروايات السحابية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 💰 كود إعلان Popunder الخاص بك من Adsterra -->
    <script src="https://pl29586659.effectivecpmnetwork.com/66/8b/cb/668bcb4bb64a3fe6f4d61ba82b713040.js"></script>

    <style>
        :root {
            --bg-main: #0b0b0b;
            --bg-card: #141414;
            --primary-red: #e50914;
            --accent-red: #ff2e3b;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --nav-bg: #111111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }

        header {
            background-color: var(--nav-bg);
            border-bottom: 2px solid var(--primary-red);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--text-main); cursor: pointer; user-select: none; }
        .logo span { color: var(--primary-red); }
        .nav-buttons { display: flex; gap: 15px; align-items: center; }
        .menu-btn { background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; }

        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background-color: #0f0f0f; z-index: 2000; transition: right 0.4s ease; padding: 30px 20px; border-left: 1px solid rgba(229, 9, 20, 0.3); }
        .sidebar.active { right: 0; }
        .close-sidebar { background: none; border: none; color: var(--text-muted); font-size: 26px; cursor: pointer; float: left; }
        .sidebar-menu { list-style: none; clear: both; margin-top: 50px; }
        .sidebar-menu li { margin-bottom: 15px; border-bottom: 1px solid #1f1f1f; }
        .sidebar-menu a { display: block; color: var(--text-main); text-decoration: none; padding: 12px 10px; font-size: 18px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; }
        .section-title { font-size: 22px; margin-bottom: 25px; padding-right: 12px; border-right: 4px solid var(--primary-red); }
        
        .novels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 20px; }
        .novel-card { background-color: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid #1c1c1c; cursor: pointer; transition: transform 0.3s; height: 100%; display: flex; flex-direction: column; }
        .novel-card:hover { transform: translateY(-5px); border-color: var(--primary-red); }
        .thumbnail-container { position: relative; width: 100%; padding-top: 140%; background-color: #222; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .badge-status { position: absolute; top: 10px; right: 10px; background: #512da8; color: #fff; padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 6px; }
        .badge-chapter { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; padding: 10px; font-size: 12px; text-align: left; direction: ltr; }
        .novel-details { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .novel-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
        .novel-meta { display: flex; align-items: center; justify-content: space-between; }
        .rating-box { background: #fff; color: #000; padding: 3px 6px; border-radius: 6px; font-weight: 800; font-size: 12px; border: 2px solid var(--primary-red); }
        .novel-genres { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }

        .view-section { display: none; }
        .back-btn { background: none; border: none; color: var(--primary-red); font-size: 16px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        
        .novel-header-detail { display: flex; gap: 20px; margin-bottom: 20px; background: var(--bg-card); padding: 20px; border-radius: 12px; }
        .novel-header-detail img { width: 150px; height: 210px; object-fit: cover; border-radius: 8px; }
        .novel-synopsis { background: var(--bg-card); padding: 20px; border-radius: 12px; margin-bottom: 30px; line-height: 1.7; border-right: 3px solid var(--accent-red); }
        .novel-synopsis h4 { margin-bottom: 10px; color: var(--accent-red); font-size: 16px; }

        .chapters-list { list-style: none; margin-top: 20px; }
        .chapters-list li { background: var(--bg-card); padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .chapters-list li:hover { border-color: var(--primary-red); color: var(--accent-red); }
        
        .reader-content { background: #121212; padding: 25px; border-radius: 12px; line-height: 2; font-size: 19px; color: #e0e0e0; margin-top: 20px; white-space: pre-line; }
        
        /* 🕹️ أزرار التنقل الجديدة بين الفصول */
        .chapter-navigation { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .nav-chap-btn { flex: 1; background: var(--bg-card); color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .nav-chap-btn:hover { border-color: var(--primary-red); color: var(--accent-red); }
        .nav-chap-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #222; color: var(--text-muted); }

        .admin-form { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--primary-red); margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #0b0b0b; border: 1px solid #333; color: white; border-radius: 6px; }
        .form-group textarea { height: 150px; }
        .submit-btn { background: var(--primary-red); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .danger-btn { background: #b71c1c; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        @media (max-width: 480px) {
            .novels-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .novel-header-detail { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo" onclick="handleLogoClick()">King <span>Anwar</span></div>
        <div class="nav-buttons">
            <button class="menu-btn" id="menuOpenBtn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <nav class="sidebar" id="sidebar">
        <button class="close-sidebar" id="menuCloseBtn"><i class="fa-solid fa-xmark"></i></button>
        <ul class="sidebar-menu">
            <li><a href="#" onclick="showSection('home-section'); toggleSidebar();"><i class="fa-solid fa-house"></i> الرئيسية</a></li>
        </ul>
    </nav>

    <div class="container">
        
        <!-- لوحة التحكم السرية -->
        <section id="admin-section" class="view-section">
            <h2 class="section-title">لوحة التحكم السحابية الشاملة</h2>
            
            <div class="admin-form" style="border-color: #ff9800;">
                <h3>🛠️ تعديل أو حذف رواية موجودة</h3>
                <br>
                <div class="form-group">
                    <label>اختر الرواية</label>
                    <select id="edit-select-novel" onchange="loadNovelDataToEdit()"></select>
                </div>
                <div class="form-group">
                    <label>تعديل اسم الرواية</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label>تعديل قصة/ملخص الرواية</label>
                    <textarea id="edit-description" style="height: 100px;"></textarea>
                </div>
                <div class="form-group">
                    <label>تعديل رابط الغلاف</label>
                    <input type="text" id="edit-image">
                </div>
                <div class="form-group">
                    <label>تعديل التصنيفات</label>
                    <input type="text" id="edit-genres">
                </div>
                <div class="form-group">
                    <label>تعديل التقييم</label>
                    <input type="text" id="edit-rating">
                </div>
                <button class="submit-btn" style="background: #ff9800;" onclick="updateNovel()">حفظ التعديلات سحابياً</button>
                <button class="danger-btn" onclick="deleteNovel()">⚠️ حذف الرواية نهائياً</button>
            </div>

            <div class="admin-form" style="border-color: #009688;">
                <h3>📝 تعديل أو حذف فصل موجود</h3>
                <br>
                <div class="form-group">
                    <label>اختر الرواية أولاً</label>
                    <select id="edit-chapter-select-novel" onchange="updateEditChapterSelect()"></select>
                </div>
                <div class="form-group">
                    <label>اختر الفصل المراد تعديله</label>
                    <select id="edit-select-chapter" onchange="loadChapterDataToEdit()"></select>
                </div>
                <div class="form-group">
                    <label>تعديل عنوان الفصل</label>
                    <input type="text" id="edit-chapter-title">
                </div>
                <div class="form-group">
                    <label>تعديل محتوى الفصل</label>
                    <textarea id="edit-chapter-content" style="height: 250px;"></textarea>
                </div>
                <button class="submit-btn" style="background: #009688;" onclick="updateChapter()">حفظ تعديلات الفصل سحابياً</button>
                <button class="danger-btn" style="background: #e65100;" onclick="deleteChapter()">مسح هذا الفصل فقط</button>
            </div>

            <div class="admin-form">
                <h3>✨ إنشاء رواية جديدة بالكامل</h3>
                <br>
                <div class="form-group">
                    <label>اسم الرواية</label>
                    <input type="text" id="new-title">
                </div>
                <div class="form-group">
                    <label>قصة / ملخص الرواية</label>
                    <textarea id="new-description" placeholder="اكتب هنا أحداث وقصة الرواية باختصار لجذب القراء..." style="height: 120px;"></textarea>
                </div>
                <div class="form-group">
                    <label>رابط صورة الغلاف</label>
                    <input type="text" id="new-image">
                </div>
                <div class="form-group">
                    <label>التصنيفات</label>
                    <input type="text" id="new-genres">
                </div>
                <div class="form-group">
                    <label>التقييم</label>
                    <input type="text" id="new-rating" value="4.5">
                </div>
                <button class="submit-btn" onclick="createNewNovel()">حفظ ونشر الرواية سحابياً</button>
            </div>

            <div class="admin-form" style="border-color: #3f51b5;">
                <h3>✍️ إضافة فصل جديد لرواية موجودة</h3>
                <br>
                <div class="form-group">
                    <label>اختر الرواية</label>
                    <select id="select-novel"></select>
                </div>
                <div class="form-group">
                    <label>عنوان أو رقم الفصل</label>
                    <input type="text" id="chapter-title" placeholder="مثال: الفصل 1: البداية">
                </div>
                <div class="form-group">
                    <label>محتوى الفصل (نص الرواية)</label>
                    <textarea id="chapter-content" style="height: 250px;"></textarea>
                </div>
                <button class="submit-btn" style="background: #3f51b5;" onclick="createNewChapter()">نشر الفصل لجميع الزوار</button>
            </div>
        </section>

        <!-- الرئيسية -->
        <section id="home-section">
            <h2 class="section-title">تحديثات الروايات الرائجة</h2>
            <div class="novels-grid" id="novels-display-grid">
                <p style="color:var(--text-muted)">جاري جلب الروايات من السحاب...</p>
            </div>
        </section>

        <!-- تفاصيل الرواية -->
        <section id="novel-detail-section" class="view-section">
            <button class="back-btn" onclick="showSection('home-section')">⬅️ العودة للرئيسية</button>
            <div id="novel-info-container"></div>
            <div id="novel-synopsis-container" class="novel-synopsis"></div>
            <h3>الفصول المتاحة:</h3>
            <ul class="chapters-list" id="chapters-display-list"></ul>
        </section>

        <!-- قراءة الفصل -->
        <section id="reader-section" class="view-section">
            <button class="back-btn" id="back-to-novel-btn">⬅️ العودة للرواية</button>
            <h2 id="reader-chapter-title"></h2>
            <div class="reader-content" id="reader-text-box"></div>
            
            <!-- أزرار التنقل السفلية -->
            <div class="chapter-navigation">
                <button class="nav-chap-btn" id="prev-chapter-btn"><i class="fa-solid fa-arrow-right"></i> الفصل السابق</button>
                <button class="nav-chap-btn" id="next-chapter-btn">الفصل التالي <i class="fa-solid fa-arrow-left"></i></button>
            </div>
        </section>

    </div>

    <script>
        const SUPABASE_URL = "https://pbauaxezskvyzetbmuvo.supabase.co/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYXVheGV6c2t2eXpldGJtdXZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODUxODcsImV4cCI6MjA5NTY2MTE4N30.MuIwSvXN0lCmx3L02xTWKt5vtpNvIVtucWJHFeyS23I";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = "Anwar2026"; 
        let globalNovels = [];
        let logoClickCount = 0;
        let logoClickTimeout;

        function handleLogoClick() {
            logoClickCount++;
            clearTimeout(logoClickTimeout);
            logoClickTimeout = setTimeout(() => { logoClickCount = 0; }, 1500);

            if (logoClickCount === 5) {
                logoClickCount = 0;
                checkAdminPassword();
            } else if (logoClickCount === 1) {
                showSection('home-section');
            }
        }

        async function fetchNovelsFromCloud() {
            let { data: novelsData, error: nError } = await _supabase.from('novels').select('*').order('created_at', { ascending: false });
            if (nError) return console.error(nError);

            let { data: chaptersData, error: cError } = await _supabase.from('chapters').select('*').order('created_at', { ascending: true });
            if (cError) return console.error(cError);

            globalNovels = novelsData.map(novel => {
                return { ...novel, chapters: chaptersData.filter(ch => ch.novel_id === novel.id) }
            });

            renderNovels();
            updateNovelSelects();
        }

        function renderNovels() {
            const grid = document.getElementById('novels-display-grid');
            grid.innerHTML = '';
            if(globalNovels.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted)">لا توجد روايات منشورة حالياً.</p>';
                return;
            }
            globalNovels.forEach(novel => {
                const lastChapter = novel.chapters.length > 0 ? novel.chapters[novel.chapters.length - 1].title : 'لا يوجد فصول';
                grid.innerHTML += `
                    <div class="novel-card" onclick="openNovelDetail(${novel.id})">
                        <div class="thumbnail-container">
                            <span class="badge-status">مستمرة</span>
                            <img src="${novel.image}" alt="${novel.title}">
                            <div class="badge-chapter">${lastChapter.split(':')[0]}</div>
                        </div>
                        <div class="novel-details">
                            <h3 class="novel-title">${novel.title}</h3>
                            <div class="novel-meta">
                                <div class="rating-box">${novel.rating}</div>
                                <div class="novel-genres">${novel.genres}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openNovelDetail(id) {
            const novel = globalNovels.find(n => n.id == id);
            if(!novel) return;

            showSection('novel-detail-section');
            document.getElementById('novel-info-container').innerHTML = `
                <div class="novel-header-detail">
                    <img src="${novel.image}">
                    <div>
                        <h2>${novel.title}</h2>
                        <p style="margin: 10px 0; color: var(--text-muted)">التصنيف: ${novel.genres}</p>
                        <div class="rating-box" style="display:inline-block">${novel.rating}</div>
                    </div>
                </div>
            `;

            // عرض القصة / الوصف
            const synopsisContainer = document.getElementById('novel-synopsis-container');
            if(novel.description) {
                synopsisContainer.style.display = "block";
                synopsisContainer.innerHTML = `<h4><i class="fa-solid fa-book-open"></i> قصة الرواية:</h4><p>${novel.description}</p>`;
            } else {
                synopsisContainer.style.display = "none";
            }

            const list = document.getElementById('chapters-display-list');
            list.innerHTML = '';
            if(novel.chapters.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted)">لا توجد فصول منشورة بعد.</p>';
            } else {
                novel.chapters.forEach((chapter, index) => {
                    list.innerHTML += `<li onclick="readChapter(${id}, ${index});">${chapter.title}</li>`;
                });
            }
        }

        function readChapter(novelId, chapterIndex) {
            const novel = globalNovels.find(n => n.id == novelId);
            if (!novel || !novel.chapters[chapterIndex]) return;

            const chapter = novel.chapters[chapterIndex];
            
            showSection('reader-section');
            document.getElementById('reader-chapter-title').innerText = chapter.title;
            document.getElementById('reader-text-box').innerText = chapter.content;

            // إعداد أزرار الانتقال (السابق والتالي)
            const prevBtn = document.getElementById('prev-chapter-btn');
            const nextBtn = document.getElementById('next-chapter-btn');

            // الفصل السابق (العودة إلى الخلف في القائمة)
            if (chapterIndex > 0) {
                prevBtn.disabled = false;
                prevBtn.onclick = function() { readChapter(novelId, chapterIndex - 1); };
            } else {
                prevBtn.disabled = true;
            }

            // الفصل التالي (التقدم للأمام في القائمة)
            if (chapterIndex < novel.chapters.length - 1) {
                nextBtn.disabled = false;
                nextBtn.onclick = function() { readChapter(novelId, chapterIndex + 1); };
            } else {
                nextBtn.disabled = true;
            }

            document.getElementById('back-to-novel-btn').onclick = function() { openNovelDetail(novelId); };
        }

        function updateNovelSelects() {
            const selectAdd = document.getElementById('select-novel');
            const selectEdit = document.getElementById('edit-select-novel');
            const selectEditChapNovel = document.getElementById('edit-chapter-select-novel');
            let options = '';
            globalNovels.forEach(novel => { options += `<option value="${novel.id}">${novel.title}</option>`; });
            if(selectAdd) selectAdd.innerHTML = options;
            if(selectEdit) { selectEdit.innerHTML = options; loadNovelDataToEdit(); }
            if(selectEditChapNovel) { selectEditChapNovel.innerHTML = options; updateEditChapterSelect(); }
        }

        function loadNovelDataToEdit() {
            const novelId = document.getElementById('edit-select-novel').value;
            const novel = globalNovels.find(n => n.id == novelId);
            if(novel) {
                document.getElementById('edit-title').value = novel.title;
                document.getElementById('edit-description').value = novel.description || '';
                document.getElementById('edit-image').value = novel.image;
                document.getElementById('edit-genres').value = novel.genres;
                document.getElementById('edit-rating').value = novel.rating;
            }
        }

        function updateEditChapterSelect() {
            const novelId = document.getElementById('edit-chapter-select-novel').value;
            const novel = globalNovels.find(n => n.id == novelId);
            const selectChapter = document.getElementById('edit-select-chapter');
            if(novel && selectChapter) {
                selectChapter.innerHTML = '';
                if(novel.chapters.length === 0) {
                    selectChapter.innerHTML = '<option value="">لا توجد فصول</option>';
                    document.getElementById('edit-chapter-title').value = '';
                    document.getElementById('edit-chapter-content').value = '';
                    return;
                }
                novel.chapters.forEach(ch => { selectChapter.innerHTML += `<option value="${ch.id}">${ch.title}</option>`; });
                loadChapterDataToEdit();
            }
        }

        function loadChapterDataToEdit() {
            const novelId = document.getElementById('edit-chapter-select-novel').value;
            const chapterId = document.getElementById('edit-select-chapter').value;
            const novel = globalNovels.find(n => n.id == novelId);
            if(novel && chapterId) {
                const chapter = novel.chapters.find(ch => ch.id == chapterId);
                if(chapter) {
                    document.getElementById('edit-chapter-title').value = chapter.title;
                    document.getElementById('edit-chapter-content').value = chapter.content;
                }
            }
        }

        async function updateChapter() {
            const chapterId = document.getElementById('edit-select-chapter').value;
            const title = document.getElementById('edit-chapter-title').value;
            const content = document.getElementById('edit-chapter-content').value;
            if(!chapterId || !title || !content) return alert('تأكد من تعبئة جميع الحقول');
            const { error } = await _supabase.from('chapters').update({ title, content }).eq('id', chapterId);
            if(error) alert('حدث خطأ'); else { alert('تم تحديث الفصل!'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        async function deleteChapter() {
            const chapterId = document.getElementById('edit-select-chapter').value;
            if(!chapterId || !confirm("هل تريد حذف هذا الفصل؟")) return;
            const { error } = await _supabase.from('chapters').delete().eq('id', chapterId);
            if(error) alert('حدث خطأ'); else { alert('تم الحذف!'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        async function updateNovel() {
            const novelId = document.getElementById('edit-select-novel').value;
            const title = document.getElementById('edit-title').value;
            const description = document.getElementById('edit-description').value;
            const image = document.getElementById('edit-image').value;
            const genres = document.getElementById('edit-genres').value;
            const rating = document.getElementById('edit-rating').value;
            const { error } = await _supabase.from('novels').update({ title, description, image, genres, rating }).eq('id', novelId);
            if(error) alert('حدث خطأ'); else { alert('تم تعديل بيانات الرواية!'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        async function deleteNovel() {
            const novelId = document.getElementById('edit-select-novel').value;
            if(!confirm("هل أنت متأكد من حذف الرواية؟")) return;
            const { error } = await _supabase.from('novels').delete().eq('id', novelId);
            if(error) alert('حدث خطأ'); else { alert('تم الحذف.'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        async function createNewNovel() {
            const title = document.getElementById('new-title').value;
            const description = document.getElementById('new-description').value;
            const image = document.getElementById('new-image').value || 'https://via.placeholder.com/400x560?text=No+Cover';
            const genres = document.getElementById('new-genres').value;
            const rating = document.getElementById('new-rating').value;
            if(!title) return alert('الاسم مطلوب');
            const { error } = await _supabase.from('novels').insert([{ title, description, image, genres, rating }]);
            if(error) alert('حدث خطأ'); else { alert('تم حفظ الرواية الجديدة بالقصة!'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        async function createNewChapter() {
            const novelId = document.getElementById('select-novel').value;
            const chTitle = document.getElementById('chapter-title').value;
            const chContent = document.getElementById('chapter-content').value;
            if(!chTitle || !chContent) return alert('تأكد من البيانات');
            const { error } = await _supabase.from('chapters').insert([{ novel_id: novelId, title: chTitle, content: chContent }]);
            if(error) alert('حدث خطأ'); else { alert('تم نشر الفصل!'); await fetchNovelsFromCloud(); showSection('home-section'); }
        }

        function checkAdminPassword() {
            const promptPass = prompt("أدخل كلمة مرور الإدارة:");
            if(promptPass === ADMIN_PASSWORD) showSection('admin-section');
            else if(promptPass !== null) alert("خاطئة!");
        }

        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('view-section'));
            document.getElementById(sectionId).classList.remove('view-section');
            window.scrollTo(0,0);
        }

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleSidebar() { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        document.getElementById('menuOpenBtn').addEventListener('click', toggleSidebar);
        document.getElementById('menuCloseBtn').addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        fetchNovelsFromCloud();
    </script>
</body>
</html>
