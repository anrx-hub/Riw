<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>King Anwar - منصة الروايات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type='text/javascript' src='//pl29586659.effectivecpmnetwork.com/66/8b/cb/668bcb4bb64a3fe6f4d61ba82b713040.js'></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .admin-form { background: #141414; padding: 20px; border: 1px solid #e50914; border-radius: 10px; margin-top: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        button { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">لوحة التحكم - King Anwar</h1>

    <div class="admin-form">
        <h3>إنشاء رواية جديدة مع صورة</h3>
        <input type="text" id="novel-title" placeholder="اسم الرواية">
        <textarea id="novel-desc" placeholder="وصف الرواية"></textarea>
        <input type="file" id="novel-image" accept="image/*">
        <button onclick="uploadAndSave()">حفظ ونشر الرواية</button>
    </div>

    <script>
        // تأكد من وضع مفاتيحك الصحيحة هنا
        const SUPABASE_URL = "https://pbauaxezskvyzetbmuvo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYXVheGV6c2t2eXpldGJtdXZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODUxODcsImV4cCI6MjA5NTY2MTE4N30.MuIwSvXN0lCmx3L02xTWKt5vtpNvIVtucWJHFeyS23I";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function uploadAndSave() {
            const title = document.getElementById('novel-title').value;
            const desc = document.getElementById('novel-desc').value;
            const file = document.getElementById('novel-image').files[0];

            if (!file) { alert("يرجى اختيار صورة أولاً!"); return; }

            // 1. رفع الصورة
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('covers')
                .upload(fileName, file);

            if (uploadError) {
                alert("خطأ في رفع الصورة: " + uploadError.message);
                return;
            }

            // 2. الحصول على الرابط
            const { data: urlData } = supabase.storage.from('covers').getPublicUrl(fileName);
            
            // 3. حفظ البيانات في الجدول
            const { error: dbError } = await supabase.from('novels').insert([
                { title: title, description: desc, image: urlData.publicUrl }
            ]);

            if (dbError) {
                alert("خطأ في حفظ البيانات: " + dbError.message);
            } else {
                alert("تم رفع الرواية بنجاح!");
            }
        }
    </script>
</body>
</html>
